name: 高清视频帧抓取机器人
on:
  schedule:
    - cron: '10 13 * * *' # 北京时间 21:10
  workflow_dispatch: 

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统级工具 (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 安装 Python 依赖 (yt-dlp & requests)
        run: |
          pip install yt-dlp requests

      - name: 执行高清抽帧脚本
        env:
          COZE_TOKEN: ${{ secrets.COZE_TOKEN }}
          WORKFLOW_ID: ${{ secrets.WORKFLOW_ID }}
          IMGBB_KEY: ${{ secrets.IMGBB_KEY }}
        run: python screenshot.py
