name: 每天自动抓取新闻截图
on:
  schedule:
    # 每天北京时间 21:10 运行 (UTC 13:10)
    - cron: '10 13 * * *'
  workflow_dispatch: # 允许你手动点击运行

jobs:
  capture:
    runs-on: ubuntu-latest # 使用云端 Ubuntu 系统
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装浏览器和依赖
        run: |
          pip install playwright requests
          playwright install chromium

      - name: 执行截图脚本
        env:
          COZE_TOKEN: ${{ secrets.COZE_TOKEN }}
          WORKFLOW_ID: ${{ secrets.WORKFLOW_ID }}
          IMGBB_KEY: ${{ secrets.IMGBB_KEY }}  # <--- 这一行必须有！
        run: python screenshot.py
